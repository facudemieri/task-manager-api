services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: TaskManagerDb
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
      JwtSettings__Secret: esta-es-mi-clave-secreta-super-larga-para-jwt-2024
      ConnectionStrings__DefaultConnection: Host=db;Database=TaskManagerDb;Username=postgres;Password=postgres
    depends_on:
      - db

volumes:
  postgres_data: